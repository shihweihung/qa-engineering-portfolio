site_name: QA Interview Bible
site_description: Professional QA and software testing knowledge base
site_url: https://shihweihung.github.io/qa-interview-bible/
repo_url: https://github.com/shihweihung/qa-interview-bible
repo_name: shihweihung/qa-interview-bible
edit_uri: edit/master/docs/

theme:
  name: material
  language: en
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.path
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      type: datetime

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shihweihung/qa-interview-bible
      name: GitHub repository
  homepage: https://shihweihung.github.io/qa-interview-bible/

copyright: Copyright &copy; 2026 Shih-Wei Hung. Built with Material for MkDocs.

nav:
  - ":material-home-outline: Home": index.md
  - ":material-account-voice-outline: Interview":
      - Overview: interview/index.md
  - ":material-shield-check-outline: QA & Leadership":
      - QA Strategy: qa/index.md
      - Leadership: leadership/index.md
  - ":material-notebook-outline: Notes":
      - Overview: notes/index.md
      - Automation Framework Adoption: notes/automation-framework-adoption.md
  - ":material-bug-outline: Case Studies":
      - Overview: real-bugs/index.md
